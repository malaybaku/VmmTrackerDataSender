<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VMM Tracker Data Sender</title>
  <link rel="stylesheet" href="/styles/common.css">
  <link rel="stylesheet" href="/styles/app.css">
</head>
<body>
  <div id="app">
    <header id="app-header">
      <span class="status" id="connection-status"></span>
      <button id="drawer-toggle" class="drawer-toggle" aria-label="Menu">
        <span class="drawer-toggle-bar"></span>
        <span class="drawer-toggle-bar"></span>
        <span class="drawer-toggle-bar"></span>
      </button>
    </header>
    <div id="video-container">
      <video id="video" autoplay playsinline></video>
      <canvas id="preview-canvas"></canvas>
      <div id="preview-overlay"></div>
      <div id="controls">
        <div class="control-panel">
          <label>Preview:</label>
          <select id="preview-mode-select">
            <option value="data-only">表示なし</option>
            <option value="landmarks" selected>ランドマーク</option>
            <option value="camera">映像</option>
          </select>
        </div>
        <button id="restart-tracking-btn" class="btn-restart">再開</button>
      </div>
    </div>
    <div class="footer">
      <a href="https://github.com/malaybaku/VmmTrackerDataSender" target="_blank" rel="noopener noreferrer">Source (GitHub)</a>
      <span class="footer-sep">|</span>
      <a href="licenses.html" target="_blank" rel="noopener noreferrer">Licenses</a>
      <span class="footer-sep">|</span>
      <a href="privacy-policy.html" target="_blank" rel="noopener noreferrer">Privacy Policy</a>
      <span class="lang-switch" id="lang-switch">
        <span class="lang-option active" data-lang="ja">JA</span>
        <span class="lang-option" data-lang="en">EN</span>
      </span>
    </div>
  </div>

  <div id="drawer-backdrop" class="drawer-backdrop"></div>
  <nav id="drawer" class="drawer">
    <div class="drawer-content">
      <span id="app-title" class="drawer-title">VMM Tracker</span>
      <div class="drawer-divider"></div>
      <a href="https://github.com/malaybaku/VmmTrackerDataSender" target="_blank" rel="noopener noreferrer" class="drawer-link" id="drawer-link-github">Source (GitHub)</a>
      <a href="licenses.html" target="_blank" rel="noopener noreferrer" class="drawer-link" id="drawer-link-licenses">Licenses</a>
      <a href="privacy-policy.html" target="_blank" rel="noopener noreferrer" class="drawer-link" id="drawer-link-privacy">Privacy Policy</a>
      <div class="drawer-divider"></div>
      <span class="lang-switch" id="drawer-lang-switch">
        <span class="lang-option active" data-lang="ja">JA</span>
        <span class="lang-option" data-lang="en">EN</span>
      </span>
    </div>
  </nav>

  <!-- Connection Modal -->
  <div id="connection-modal" class="modal">
    <div class="modal-content" style="text-align: center;">
      <p id="connection-modal-message" style="white-space: pre-line; line-height: 1.6;"></p>
      <button id="connection-modal-close" style="margin-top: 1rem; display: none;">OK</button>
      <div id="connection-modal-consent" style="display: none;">
        <button id="connection-modal-setup-btn" style="margin-top: 1rem; font-size: 1.1rem; padding: 0.6rem 1.5rem;">接続先をセットアップ</button>
        <p style="margin-top: 0.75rem; font-size: 0.8rem; color: #999;">接続先をセットアップすると <a href="privacy-policy.html" target="_blank" rel="noopener noreferrer" style="color: #007bff;">プライバシーポリシー (Privacy Policy)</a> に同意したことになります</p>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
